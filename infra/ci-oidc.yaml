AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Based staging CI/CD — GitHub Actions OIDC trust. Creates the GitHub OIDC
  identity provider and a scoped deploy role (based-staging-ci-deploy) that
  only the main-branch workflow of geda0/Based may assume via
  AssumeRoleWithWebIdentity. Zero stored AWS keys: GitHub Actions presents a
  short-lived OIDC token and STS returns temporary credentials. The Gemini key
  is NOT needed here — infra/deploy-staging.sh reuses the existing SSM
  SecureString when GEMINI_API_KEY is unset, so no secret flows through CI.

Resources:
  # GitHub Actions OIDC identity provider. AWS validates GitHub's TLS cert
  # itself; the thumbprint is a formality CloudFormation requires.
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # Role the GitHub Actions deploy workflow assumes. Trust is pinned to the
  # main branch of geda0/Based and to the sts.amazonaws.com audience, so no
  # other repo, branch, PR, or workflow can assume it.
  CiDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: based-staging-ci-deploy
      Description: GitHub Actions deploy role for Based staging (main-branch workflows only, via OIDC).
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:geda0/Based:ref:refs/heads/main"
      Policies:
        - PolicyName: based-staging-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ---- ECR: auth token is account-wide; the rest is repo-scoped. ----
              - Sid: EcrAuthToken
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: EcrRepo
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/based-staging-backend"

              # ---- CloudFormation: only the two staging stacks; validate is global. ----
              - Sid: CloudFormationStacks
                Effect: Allow
                Action: "cloudformation:*"
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/based-staging/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/based-staging-ecr/*"
              - Sid: CloudFormationValidate
                Effect: Allow
                Action: cloudformation:ValidateTemplate
                Resource: "*"

              # ---- S3: the staging frontend bucket only. ----
              - Sid: S3ListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: "arn:aws:s3:::based-staging-frontendbucket-zwbn0iylz1y7"
              - Sid: S3Objects
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource: "arn:aws:s3:::based-staging-frontendbucket-zwbn0iylz1y7/*"

              # ---- CloudFront: distribution ARNs are global, so resource is *. ----
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:GetDistribution
                Resource: "*"

              # ---- App Runner: resource ARNs are awkward to scope; * for staging. ----
              - Sid: AppRunner
                Effect: Allow
                Action: "apprunner:*"
                Resource: "*"

              # ---- SSM: only the Based staging parameter namespace. ----
              - Sid: SsmStagingParams
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:DescribeParameters
                  - ssm:PutParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/based/staging/*"

              # ---- IAM: only the CloudFormation-managed based-staging-* roles. ----
              - Sid: IamStagingRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/based-staging-*"

Outputs:
  DeployRoleArn:
    Description: ARN of the GitHub Actions deploy role to set as role-to-assume in the workflow.
    Value: !GetAtt CiDeployRole.Arn
  OidcProviderArn:
    Description: ARN of the GitHub Actions OIDC identity provider.
    Value: !Ref GitHubOidcProvider
