AWSTemplateFormatVersion: "2010-09-09"
Description: Based staging - ECR repository for the backend container image (deployed first so the image can be pushed before the App Runner service is created).

Resources:
  BackendRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: based-staging-backend
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 10 images",
                "selection": { "tagStatus": "any", "countType": "imageCountMoreThan", "countNumber": 10 },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Description: ECR repository URI to tag/push the backend image to.
    Value: !GetAtt BackendRepo.RepositoryUri
  RepositoryName:
    Value: !Ref BackendRepo
