AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Based staging environment. Frontend: private S3 bucket served by CloudFront via
  Origin Access Control. Backend: containerized Fastify on AWS App Runner, pulling
  the image from ECR. Created after the image is pushed (see infra/deploy-staging.sh).

Parameters:
  BackendImageUri:
    Type: String
    Description: Full ECR image URI:tag for the backend container (e.g. 123.dkr.ecr.us-east-2.amazonaws.com/based-staging-backend:abc123).
  GeminiSsmParameterArn:
    Type: String
    Description: ARN of the SSM SecureString holding GEMINI_API_KEY (created/updated by infra/deploy-staging.sh; never the key value itself).
  GeminiModel:
    Type: String
    Default: gemini-3.1-flash-lite
    Description: >
      Gemini model id used by the M3 narration proxy. NON-SECRET. This version-controlled
      default is the single source of truth: CI (no backend/.env) uses it as-is;
      deploy-staging.sh only passes a parameter-override when backend/.env sets GEMINI_MODEL
      (local override). See docs/decisions/0005-staging-deployment.md.

Resources:
  # ---------- Frontend: private S3 + CloudFront (OAC) ----------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: based-staging-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Based staging frontend (SPA)
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: s3-frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3-frontend
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # AWS managed "CachingOptimized" policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          # SPA routing: serve index.html for client-side routes.
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadViaOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # ---------- Backend: App Runner from ECR ----------
  AppRunnerECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: based-staging-apprunner-ecr-access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  # Runtime role: lets the container read GEMINI_API_KEY from SSM Parameter Store.
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: based-staging-apprunner-instance
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: read-gemini-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource: !Ref GeminiSsmParameterArn
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  BackendService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: based-staging-backend
      SourceConfiguration:
        AutoDeploymentsEnabled: false
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        ImageRepository:
          ImageIdentifier: !Ref BackendImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
            RuntimeEnvironmentVariables:
              - Name: NODE_ENV
                Value: production
              - Name: PORT
                Value: "8080"
              - Name: CORS_ORIGINS
                Value: !Sub "https://${FrontendDistribution.DomainName}"
              - Name: GEMINI_MODEL
                Value: !Ref GeminiModel
            RuntimeEnvironmentSecrets:
              - Name: GEMINI_API_KEY
                Value: !Ref GeminiSsmParameterArn
      InstanceConfiguration:
        Cpu: "0.25 vCPU"
        Memory: "0.5 GB"
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5

Outputs:
  CloudFrontUrl:
    Description: Public URL of the staging frontend.
    Value: !Sub "https://${FrontendDistribution.DomainName}"
  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution
  FrontendBucketName:
    Value: !Ref FrontendBucket
  BackendServiceUrl:
    Description: Public URL of the staging backend (App Runner).
    Value: !Sub "https://${BackendService.ServiceUrl}"
  BackendImageUri:
    Value: !Ref BackendImageUri
